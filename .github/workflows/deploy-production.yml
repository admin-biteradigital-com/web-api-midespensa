name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    environment: production # Esto activa la compuerta de aprobación manual en GitHub

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: worker

      - name: Deploy Worker to Cloudflare Workers (Production)
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Client to Cloudflare Pages (Production)
        run: |
          npx wrangler pages project list --account-id=69880180c9b38ae06acef2a021729a72
          npx wrangler pages deploy client --project-name=midespensa-client --branch=main --commit-dirty=true --account-id=69880180c9b38ae06acef2a021729a72
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Audit - CD Deploy Production
        run: node scripts/record-audit-log.js CD_DEPLOY_PRODUCTION "{\"commit\":\"${{ github.sha }}\",\"actor\":\"${{ github.actor }}\",\"environment\":\"production\"}"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
