name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: worker

      - name: Deploy Worker to Cloudflare Workers (Staging)
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Client to Cloudflare Pages (Staging)
        run: npx wrangler pages deploy client --project-name=midespensa-client --branch=staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Audit - CD Deploy Staging
        run: node scripts/record-audit-log.js CD_DEPLOY_STAGING "{\"commit\":\"${{ github.sha }}\",\"actor\":\"${{ github.actor }}\",\"environment\":\"staging\"}"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
