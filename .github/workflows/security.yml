name: Security & Drift Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  security:
    name: Security Scan and Configuration Drift Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: worker

      - name: Run Configuration Drift Check
        run: node scripts/drift-check.js

      - name: Run Security Audit (High/Critical Gates)
        run: npm audit --audit-level=high
        working-directory: worker

      - name: Audit - Security Scan Passed
        if: success()
        run: node scripts/record-audit-log.js SECURITY_SCAN_PASSED "{\"commit\":\"${{ github.sha }}\",\"status\":\"passed\"}"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}

      - name: Audit - Security Scan Failed
        if: failure()
        run: node scripts/record-audit-log.js SECURITY_SCAN_FAILED "{\"commit\":\"${{ github.sha }}\",\"status\":\"failed\"}"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
